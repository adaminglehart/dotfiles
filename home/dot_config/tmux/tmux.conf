# tmux configuration
# Managed by chezmoi (see ~/dev/dotfiles)
# Primary use: running pi agent (nested inside zellij)

# Extended keys — required for pi (Shift+Enter, Ctrl+Enter, etc.)
# "always" sends extended key sequences unconditionally (not just when the app requests them)
# This is needed because pi's kitty protocol query fails in tmux, and the modifyOtherKeys
# fallback may not reliably trigger tmux's extended-keys forwarding
set -g extended-keys always
set -g extended-keys-format csi-u

# Tell tmux the outer terminal supports extended keys (kitty/CSI-u protocol)
# Without this, tmux won't request extended key sequences from zellij/terminal
set -as terminal-features 'xterm*:extkeys'

# Allow applications to pass escape sequences through tmux to the outer terminal
set -g allow-passthrough on

# Enable mouse — lets tmux handle scroll within its own buffer
# This means scroll navigates tmux's history (not zellij's)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Disable status bar to minimize visual noise when nested
set -g status off
