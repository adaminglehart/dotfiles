# tmux configuration
# Managed by chezmoi (see ~/dev/dotfiles)
# Primary use: running pi agent (nested inside zellij)

# Kitty keyboard protocol — required for pi (Shift+Enter, Ctrl+Enter, etc.)
# Requires tmux >= next-3.7 (installed via: brew install tmux --HEAD)
# tmux negotiates kitty protocol with the outer terminal (Ghostty/Zellij)
# and passes CSI-u sequences like ESC[13;2u to inner applications (pi).
# extended-keys is kept as fallback for compatibility.
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Allow applications to pass escape sequences through tmux to the outer terminal
set -g allow-passthrough on

# Enable mouse — lets tmux handle scroll within its own buffer
# This means scroll navigates tmux's history (not zellij's)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Disable status bar to minimize visual noise when nested
set -g status off
